appId: com.bmacw.app
productName: BMacW
copyright: BMacW, native macOS BMW diagnostics

directories:
  output: ../dist-release
  buildResources: .

# re-sign ad-hoc after extraResources land, else the seal breaks ("damaged")
afterPack: ./build/after-pack.js

# What goes inside the app's app.asar (the Electron front-end).
files:
  - main.js
  - preload.js
  - renderer/**/*
  - icon.png

# Self-contained extras placed under Contents/Resources:
#  - server-dist : the published .NET engine (self-contained single-file publish:
#                  InpaMac.Server executable + native libs; no .NET runtime
#                  needed on the user's machine — see build:server in package.json)
#  - data        : the EDIABAS/INPA data the engine reads (BMACW_ROOT/vendor, /tools).
#                  Only EDIABAS/Ecu is read at runtime (Program.cs: root/vendor/EDIABAS/Ecu);
#                  Bin (Win32 tools) and Hardware (drivers) are dead weight, so skip them.
extraResources:
  - from: server-dist
    to: server-dist
  - from: ../vendor/EDIABAS/Ecu
    to: data/vendor/EDIABAS/Ecu
  - from: ../vendor/EC-APPS
    to: data/vendor/EC-APPS
  - from: ../tools/translations
    to: data/tools/translations
  - from: ../data/inpa-layouts/enriched
    to: data/inpa-layouts/enriched

# ship only English locale packs (drops ~55 unused .lproj/.pak, ~40MB)
electronLanguages:
  - en

mac:
  category: public.app-category.utilities
  icon: icon.icns
  target:
    - target: dmg
      arch:
        - arm64
  # Unsigned local build (no Apple Developer account). Ad-hoc sign so it runs
  # after the user clears quarantine (right-click → Open).
  identity: null

dmg:
  title: BMacW
  # drag-to-Applications layout
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
